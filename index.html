<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pardon - Legal & Support</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f4f7f6; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            text-align: center; 
            max-width: 420px; 
            width: 100%; 
            margin: 20px;
        }
        .logo { 
            width: 85px; 
            height: 85px; 
            margin-bottom: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 12px rgba(106, 17, 203, 0.2);
        }
        h1 { color: #6A11CB; margin-bottom: 8px; font-size: 26px; letter-spacing: -0.5px; }
        p { color: #777; margin-bottom: 30px; font-size: 15px; }
        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-btn { 
            text-decoration: none; 
            background: #ffffff; 
            color: #444; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            transition: all 0.25s ease; 
            font-weight: 500; 
            font-size: 16px;
        }
        .link-btn:hover { 
            background: #6A11CB; 
            color: white; 
            border-color: #6A11CB; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.2);
        }
        .footer { 
            margin-top: 35px; 
            font-size: 12px; 
            color: #bbb; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://raw.githubusercontent.com/gainqagray/icon/main/icon.png" alt="Pardon Icon" class="logo">
        <h1>Pardon</h1>
        <p>Legal Information & Support Center</p>
        
        <div class="links">
            <a href="privacy.html" class="link-btn">Privacy Policy</a>
            <a href="terms.html" class="link-btn">Terms of Service</a>
            <a href="data-safety.html" class="link-btn">Data Safety Summary</a>
            <a href="help.html" class="link-btn">Help Center & FAQ</a>
        </div>

        <div class="footer">
            © 2026 Pardon App
        </div>
    </div>
</body>
</html>
